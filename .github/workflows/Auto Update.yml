name: Auto Update
on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  AutoUpdate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python script/UpdateGithub.py
          python script/UpdateNet.py
          python script/UpdateCrx.py
          
      - name: Get time
        run: echo "NOW=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV

      - name: Commit and push
        uses: EndBug/add-and-commit@v10
        with:
          message: "Update ${{ env.NOW }}"
