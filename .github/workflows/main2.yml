name: 软件自动更新2
on:
  workflow_dispatch:      # 手动触发（保留）
  schedule:
    - cron: '0 6 * * *'   # 每天 UTC 6点（北京时间14点）自动检查


jobs:
  update-software:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GH_PAT }}  # 你的PAT密钥，需要推送代码回仓库

        
      - name: 配置Python环境（带缓存）
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'  # 缓存依赖包，大幅加速安装（核心优化）
          # 可选：依赖文件非根目录时指定路径
          cache-dependency-path: 'requirements.txt'
          
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # 安装所有依赖

      - name: 执行更新脚本
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # 内置Token（API调用）
        run: |
          python gh_release_downloader.py
          
      - name: Commit changes
        uses: EndBug/add-and-commit@v10
        with:
          message: '更新时间: ${{ env.CURRENT_TIME }}'
          committer_name: GitHub Actions
          committer_email: actions@github.com
        env:
          CURRENT_TIME: $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')
