name: 软件自动更新
on:
  push:
  workflow_dispatch:      # 手动触发（保留）
  schedule:
    - cron: '0 6 * * *'   # 每天 UTC 6点（北京时间14点）自动检查


jobs:
  update-software:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v5

      - name: 配置Python环境（带缓存）
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'  # 缓存依赖包，大幅加速安装（核心优化）
          # 可选：依赖文件非根目录时指定路径
          cache-dependency-path: 'requirements.txt'
          
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # 安装所有依赖

      - name: 执行更新脚本
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # 内置Token（API调用）
        run: |
          python gh_release_downloader.py

      - name: 提交更新文件（普通推送）
        run: |
          git config --global user.name "软件更新机器人"
          git config --global user.email "software-bot@github.com"

          # 1. 检查文件大小（跳过超限文件）
          find software/ -type f -size +100M -print0 | xargs -0 rm -f
          echo "✅ 已清理超过100MB的文件"
          
          git add .
          if git diff --cached --quiet; then
              echo "ℹ️  无文件变更，跳过提交"
              exit 0
          fi
          
          git commit -m "更新时间: $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"
          git push origin main
